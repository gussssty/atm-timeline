<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea de tiempo — Intervenciones técnicas ATM</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117; --surface:#181c27; --border:#252a38;
    --accent:#e05c3a; --accent2:#f0a060;
    --text:#d4d8e8; --muted:#6b7290;
    --label-w:210px; --row-h:28px; --row-gap:4px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;min-height:100vh}
  header{padding:24px 28px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px}
  .title{font-size:18px;font-weight:500;letter-spacing:-.2px}
  .subtitle{font-size:12px;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace}
  .controls{padding:14px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface)}
  .ctrl-group{display:flex;align-items:center;gap:8px}
  label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  input[type="date"],input[type="text"],select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:4px;font-size:12px;font-family:'IBM Plex Mono',monospace}
  input[type="text"]{width:180px;font-family:'IBM Plex Sans',sans-serif}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  .sep{width:1px;height:24px;background:var(--border)}
  .kpi-strip{display:flex;gap:20px;margin-left:auto}
  .kpi{text-align:right}
  .kpi-val{font-size:20px;font-weight:500;font-family:'IBM Plex Mono',monospace;color:var(--accent2)}
  .kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .chart-wrap{overflow:auto;padding:16px 28px 28px}
  .chart-inner{min-width:700px}
  .axis-row{display:flex;align-items:center;margin-bottom:8px;position:sticky;top:0;background:var(--bg);z-index:10;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .axis-label-spacer{width:var(--label-w);flex-shrink:0}
  .axis-ticks{flex:1;position:relative;height:24px}
  .axis-tick{position:absolute;font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;transform:translateX(-50%);white-space:nowrap}
  .row-wrap{display:flex;align-items:center;height:var(--row-h);margin-bottom:var(--row-gap)}
  .row-label{width:var(--label-w);flex-shrink:0;padding-right:12px;display:flex;flex-direction:column;justify-content:center}
  .row-atm{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--text)}
  .row-loc{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:195px}
  .row-track{flex:1;position:relative;height:100%}
  .grid-line{position:absolute;top:0;bottom:0;width:1px;background:var(--border);opacity:.5;pointer-events:none}
  .seg{position:absolute;top:4px;bottom:4px;border-radius:3px;background:var(--accent);transition:filter .15s,top .15s,bottom .15s;cursor:pointer}
  .seg:hover{filter:brightness(1.25);top:2px;bottom:2px}
  #tooltip{position:fixed;pointer-events:none;background:#1e2235;border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:12px;z-index:100;display:none;max-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  #tooltip .tt-atm{font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:13px;color:var(--accent2);margin-bottom:4px}
  #tooltip .tt-loc{color:var(--muted);font-size:11px;margin-bottom:8px}
  #tooltip .tt-row{display:flex;justify-content:space-between;gap:16px;margin-bottom:2px}
  #tooltip .tt-key{color:var(--muted)}
  #tooltip .tt-val{font-family:'IBM Plex Mono',monospace;font-weight:500}
  #tooltip .tt-div{border-top:1px solid var(--border);margin:6px 0}
  .empty{text-align:center;padding:60px 0;color:var(--muted)}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

function parseDate(s){const[d,m,y]=s.split('/');return new Date(+y,+m-1,+d)}
function fmtDate(d){return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'})}
function fmtShort(d){return d.toLocaleDateString('es-AR',{day:'2-digit',month:'short'})}
let rangeStart=new Date('2026-01-02'),rangeEnd=new Date('2026-04-11'),searchTxt='',sortMode='dias';
const tooltip=document.getElementById('tooltip');
function getFilteredSorted(){
  const q=searchTxt.toLowerCase();
  let list=RAW.filter(a=>{
    if(q&&!String(a.atm).includes(q)&&!a.loc.toLowerCase().includes(q))return false;
    return a.segs.some(s=>parseDate(s.ini)<=rangeEnd&&parseDate(s.fin)>=rangeStart);
  });
  list.sort((a,b)=>{
    if(sortMode==='dias')return b.total-a.total;
    if(sortMode==='atm')return a.atm-b.atm;
    if(sortMode==='loc')return a.loc.localeCompare(b.loc);
    if(sortMode==='ini')return parseDate(a.segs[0].ini)-parseDate(b.segs[0].ini);
    return 0;
  });
  return list;
}
function pct(d){return Math.max(0,Math.min(100,(d-rangeStart)/(rangeEnd-rangeStart)*100))}
function buildAxis(){
  const ax=document.getElementById('axis');ax.innerHTML='';
  const days=(rangeEnd-rangeStart)/86400000;
  const step=days<=31?7:days<=90?14:30;
  const cur=new Date(rangeStart);
  while(cur<=rangeEnd){
    const t=document.createElement('span');t.className='axis-tick';
    t.style.left=pct(cur)+'%';t.textContent=fmtShort(cur);ax.appendChild(t);
    cur.setDate(cur.getDate()+step);
  }
}
function buildRows(){
  const container=document.getElementById('rows');container.innerHTML='';
  const data=getFilteredSorted();
  if(!data.length){container.innerHTML='<div class="empty">Sin resultados para este período</div>';updateKPIs([]);return;}
  updateKPIs(data);
  const days=(rangeEnd-rangeStart)/86400000,step=days<=31?7:days<=90?14:30;
  const ticks=[];const tc=new Date(rangeStart);
  while(tc<=rangeEnd){ticks.push(pct(tc));tc.setDate(tc.getDate()+step);}
  data.forEach(atm=>{
    const row=document.createElement('div');row.className='row-wrap';
    const lbl=document.createElement('div');lbl.className='row-label';
    lbl.innerHTML=`<span class="row-atm">ATM ${atm.atm}</span><span class="row-loc">${atm.loc||'—'}</span>`;
    row.appendChild(lbl);
    const track=document.createElement('div');track.className='row-track';
    ticks.forEach(p=>{const gl=document.createElement('div');gl.className='grid-line';gl.style.left=p+'%';track.appendChild(gl);});
    atm.segs.forEach(seg=>{
      const ini=parseDate(seg.ini),fin=parseDate(seg.fin);
      const s=ini<rangeStart?rangeStart:ini,e=fin>rangeEnd?rangeEnd:fin;
      if(s>rangeEnd||e<rangeStart)return;
      const left=pct(s),right=pct(new Date(e.getTime()+86400000)),width=Math.max(right-left,0.4);
      const bar=document.createElement('div');bar.className='seg';
      bar.style.left=left+'%';bar.style.width=width+'%';
      bar.style.opacity=0.55+Math.min(1,seg.dias/30)*0.45;
      bar.addEventListener('mouseenter',ev=>showTip(ev,atm,seg));
      bar.addEventListener('mousemove',moveTip);
      bar.addEventListener('mouseleave',hideTip);
      track.appendChild(bar);
    });
    row.appendChild(track);container.appendChild(row);
  });
}
function updateKPIs(data){
  document.getElementById('kpi-atms').textContent=data.length;
  const dias=data.reduce((s,a)=>s+a.segs.reduce((ss,sg)=>{
    const ini=parseDate(sg.ini),fin=parseDate(sg.fin);
    const s2=ini<rangeStart?rangeStart:ini,e2=fin>rangeEnd?rangeEnd:fin;
    if(s2>e2)return ss;return ss+Math.round((e2-s2)/86400000)+1;
  },0),0);
  document.getElementById('kpi-dias').textContent=dias.toLocaleString('es-AR');
  document.getElementById('kpi-max').textContent=data.reduce((m,a)=>a.total>m?a.total:m,0)+'d';
}
function showTip(ev,atm,seg){
  const ini=parseDate(seg.ini),fin=parseDate(seg.fin);
  tooltip.innerHTML=`<div class="tt-atm">ATM ${atm.atm}</div><div class="tt-loc">${atm.loc||'—'}</div><div class="tt-div"></div><div class="tt-row"><span class="tt-key">Inicio</span><span class="tt-val">${fmtDate(ini)}</span></div><div class="tt-row"><span class="tt-key">Fin</span><span class="tt-val">${fmtDate(fin)}</span></div><div class="tt-row"><span class="tt-key">Días segmento</span><span class="tt-val">${seg.dias}</span></div><div class="tt-div"></div><div class="tt-row"><span class="tt-key">Total período</span><span class="tt-val">${atm.total} días</span></div>`;
  tooltip.style.display='block';moveTip(ev);
}
function moveTip(ev){tooltip.style.left=Math.min(ev.clientX+14,window.innerWidth-260)+'px';tooltip.style.top=Math.min(ev.clientY-10,window.innerHeight-180)+'px';}
function hideTip(){tooltip.style.display='none';}
function render(){buildAxis();buildRows();}
document.getElementById('d-from').addEventListener('change',e=>{rangeStart=new Date(e.target.value);render();});
