<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea de tiempo — Jira Service Management</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --surface:#181c27; --border:#252a38;
  --text:#d4d8e8; --muted:#6b7290;
  --c-wincor:#e05c3a; --c-ncr:#4a9eff; --c-diebold:#7ecb8f; --c-dn:#c97df0; --c-otro:#888;
  --label-w:220px; --row-h:26px; --row-gap:3px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;min-height:100vh}
header{padding:20px 28px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.title{font-size:17px;font-weight:500}
.subtitle{font-size:11px;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.kpi-strip{display:flex;gap:18px}
.kpi{text-align:right}
.kpi-val{font-size:18px;font-weight:500;font-family:'IBM Plex Mono',monospace;color:#f0a060}
.kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.legend{padding:9px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.leg-marca{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid transparent;transition:border-color .15s,color .15s;user-select:none}
.leg-marca:hover{border-color:var(--border)}
.leg-marca.active{color:var(--text);border-color:var(--border);background:var(--surface)}
.leg-shape{width:13px;height:13px;flex-shrink:0}
.shape-wincor{fill:var(--c-wincor)} .shape-ncr{fill:var(--c-ncr)}
.shape-diebold{fill:var(--c-diebold)} .shape-dn{fill:var(--c-dn)} .shape-otro{fill:var(--c-otro)}
.leg-sep{width:1px;height:16px;background:var(--border)}
.controls{padding:10px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface)}
.ctrl-group{display:flex;align-items:center;gap:7px}
label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
input[type="date"],select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px;font-family:'IBM Plex Mono',monospace}
input[type="text"]{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px;width:130px}
input:focus,select:focus{outline:none;border-color:#4a9eff}
.sep{width:1px;height:20px;background:var(--border)}
.chart-wrap{overflow:auto;padding:12px 28px 28px}
.chart-inner{min-width:680px}
.axis-row{display:flex;align-items:center;margin-bottom:6px;position:sticky;top:0;background:var(--bg);z-index:10;padding-bottom:4px;border-bottom:1px solid var(--border)}
.axis-spacer{width:var(--label-w);flex-shrink:0}
.axis-ticks{flex:1;position:relative;height:20px}
.axis-tick{position:absolute;font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;transform:translateX(-50%);white-space:nowrap}
.row-wrap{display:flex;align-items:center;height:var(--row-h);margin-bottom:var(--row-gap)}
.row-label{width:var(--label-w);flex-shrink:0;padding-right:10px;display:flex;align-items:center;gap:7px}
.row-icon{width:12px;height:12px;flex-shrink:0}
.row-info{display:flex;flex-direction:column;justify-content:center;min-width:0}
.row-atm{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;white-space:nowrap}
.row-marca{font-size:10px;color:var(--muted);white-space:nowrap}
.row-track{flex:1;position:relative;height:100%}
.grid-line{position:absolute;top:0;bottom:0;width:1px;background:var(--border);opacity:.4;pointer-events:none}
.seg{position:absolute;top:3px;bottom:3px;border-radius:3px;cursor:pointer;display:flex;align-items:center;overflow:hidden;transition:filter .12s,top .12s,bottom .12s}
.seg:hover{filter:brightness(1.35);top:1px;bottom:1px}
.seg.wincor{background:var(--c-wincor)} .seg.ncr{background:var(--c-ncr)}
.seg.diebold{background:var(--c-diebold)} .seg.dn{background:var(--c-dn)} .seg.otro{background:var(--c-otro)}
.seg-lbl{font-size:9px;font-family:'IBM Plex Mono',monospace;color:rgba(0,0,0,.75);white-space:nowrap;padding:0 4px;font-weight:500;letter-spacing:.02em;pointer-events:none}
.empty{text-align:center;padding:50px 0;color:var(--muted)}
#tooltip{position:fixed;pointer-events:none;background:#1a1e2e;border:1px solid var(--border);border-radius:7px;padding:10px 13px;font-size:12px;z-index:200;display:none;max-width:280px;box-shadow:0 6px 20px rgba(0,0,0,.6)}
.tt-header{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.tt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tt-marca-atm{font-size:12px;font-weight:500}
.tt-key{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:2px}
.tt-persona{font-size:11px;color:var(--muted);margin-bottom:5px}
.tt-res{font-weight:500;margin-bottom:7px;line-height:1.4;font-size:12px}
.tt-sub{display:inline-block;font-size:11px;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,.08);font-family:'IBM Plex Mono',monospace;margin-bottom:7px}
.tt-row{display:flex;justify-content:space-between;gap:14px;margin-bottom:2px}
.tt-label{color:var(--muted)} .tt-val{font-family:'IBM Plex Mono',monospace;font-weight:500}
.tt-div{border-top:1px solid var(--border);margin:5px 0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

const MARCA_COLOR={WINCOR:'var(--c-wincor)',NCR:'var(--c-ncr)',DIEBOLD:'var(--c-diebold)',DN:'var(--c-dn)',OTRO:'var(--c-otro)'};
function shapeHTML(m){
  if(m==='WINCOR')  return`<svg class="row-icon" viewBox="0 0 13 13"><circle cx="6.5" cy="6.5" r="5.5" class="shape-wincor"/></svg>`;
  if(m==='NCR')     return`<svg class="row-icon" viewBox="0 0 13 13"><rect x="1" y="1" width="11" height="11" rx="1" class="shape-ncr"/></svg>`;
  if(m==='DIEBOLD') return`<svg class="row-icon" viewBox="0 0 13 13"><polygon points="6.5,1 12,12 1,12" class="shape-diebold"/></svg>`;
  if(m==='DN')      return`<svg class="row-icon" viewBox="0 0 13 13"><polygon points="6.5,1 12,6.5 6.5,12 1,6.5" class="shape-dn"/></svg>`;
  return`<svg class="row-icon" viewBox="0 0 13 13"><circle cx="6.5" cy="6.5" r="5.5" class="shape-otro"/></svg>`;
}
let rangeStart=new Date('2026-01-02'),rangeEnd=new Date('2026-03-31');
let searchTxt='',sortMode='total',marcaFil='todos';
function parseDate(s){const[d,m,y]=s.split('/');return new Date(+y,+m-1,+d)}
function fmtDate(d){return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'})}
function fmtShort(d){return d.toLocaleDateString('es-AR',{day:'2-digit',month:'short'})}
function pct(d){return Math.max(0,Math.min(100,(d-rangeStart)/(rangeEnd-rangeStart)*100))}
function getTickets(atm){return atm.tickets.filter(t=>parseDate(t.ini)<=rangeEnd&&parseDate(t.fin)>=rangeStart);}
function getFiltered(){
  const q=searchTxt.toLowerCase();
  return RAW.filter(a=>{
    if(marcaFil!=='todos'&&(a.marca||'OTRO')!==marcaFil)return false;
    if(q&&!String(a.atm).includes(q))return false;
    return getTickets(a).length>0;
  }).sort((a,b)=>{
    if(sortMode==='total')return getTickets(b).length-getTickets(a).length;
    if(sortMode==='atm')return a.atm-b.atm;
    if(sortMode==='marca')return(a.marca||'').localeCompare(b.marca||'');
    if(sortMode==='ini'){const ta=getTickets(a),tb=getTickets(b);return(!ta.length||!tb.length)?0:parseDate(ta[0].ini)-parseDate(tb[0].ini);}
    return 0;
  });
}
function buildAxis(){
  const ax=document.getElementById('axis');ax.innerHTML='';
  const days=(rangeEnd-rangeStart)/86400000,step=days<=30?7:days<=90?14:30;
  const cur=new Date(rangeStart);
  while(cur<=rangeEnd){const t=document.createElement('span');t.className='axis-tick';t.style.left=pct(cur)+'%';t.textContent=fmtShort(cur);ax.appendChild(t);cur.setDate(cur.getDate()+step);}
}
function buildRows(){
  const cont=document.getElementById('rows');cont.innerHTML='';
  const data=getFiltered();
  if(!data.length){cont.innerHTML='<div class="empty">Sin resultados para este filtro</div>';document.getElementById('kpi-atms').textContent='0';document.getElementById('kpi-tickets').textContent='0';return;}
  const days=(rangeEnd-rangeStart)/86400000,step=days<=30?7:days<=90?14:30;
  const ticks=[];const tc=new Date(rangeStart);
  while(tc<=rangeEnd){ticks.push(pct(tc));tc.setDate(tc.getDate()+step);}
  let totalT=0;
  data.forEach(atm=>{
    const tickets=getTickets(atm);if(!tickets.length)return;
    totalT+=tickets.length;
    const marca=(atm.marca||'OTRO').toUpperCase(),marcaCls=marca.toLowerCase();
    const row=document.createElement('div');row.className='row-wrap';
    const lbl=document.createElement('div');lbl.className='row-label';
    lbl.innerHTML=`${shapeHTML(marca)}<div class="row-info"><span class="row-atm">ATM ${atm.atm}</span><span class="row-marca">${marca}</span></div>`;
    row.appendChild(lbl);
    const track=document.createElement('div');track.className='row-track';
    ticks.forEach(p=>{const gl=document.createElement('div');gl.className='grid-line';gl.style.left=p+'%';track.appendChild(gl);});
    tickets.forEach(ticket=>{
      const ini=parseDate(ticket.ini),fin=parseDate(ticket.fin);
      const s=ini<rangeStart?rangeStart:ini,e=fin>rangeEnd?rangeEnd:fin;
      if(s>rangeEnd||e<rangeStart)return;
      const left=pct(s),right=pct(new Date(e.getTime()+86400000)),width=Math.max(right-left,0.5);
      const bar=document.createElement('div');
      bar.className=`seg ${marcaCls}`;
      bar.style.left=left+'%';bar.style.width=width+'%';
      bar.style.opacity=0.7+Math.min(1,ticket.dias/20)*0.3;
      if(ticket.abrev&&width>3){const l=document.createElement('span');l.className='seg-lbl';l.textContent=ticket.abrev;bar.appendChild(l);}
      bar.addEventListener('mouseenter',ev=>showTip(ev,atm,ticket,marca));
      bar.addEventListener('mousemove',moveTip);
      bar.addEventListener('mouseleave',hideTip);
      track.appendChild(bar);
    });
    row.appendChild(track);cont.appendChild(row);
  });
  document.getElementById('kpi-atms').textContent=data.length;
  document.getElementById('kpi-tickets').textContent=totalT;
}
const tooltip=document.getElementById('tooltip');
function showTip(ev,atm,t,marca){
  const ini=parseDate(t.ini),fin=parseDate(t.fin),color=MARCA_COLOR[marca]||MARCA_COLOR.OTRO;
  tooltip.innerHTML=`
    <div class="tt-header"><div class="tt-dot" style="background:${color}"></div><span class="tt-marca-atm">${marca} · ATM ${atm.atm}</span></div>
    <div class="tt-key">${t.key}</div><div class="tt-persona">${t.persona}</div>
    <div class="tt-res">${t.res||'—'}</div>
    ${t.abrev?`<div class="tt-sub">${t.abrev}${t.sub&&t.sub!==t.abrev?' · <span style="opacity:.6">${t.sub}</span>':''}</div>`:''}
    <div class="tt-div"></div>
    <div class="tt-row"><span class="tt-label">Creado</span><span class="tt-val">${fmtDate(ini)}</span></div>
    <div class="tt-row"><span class="tt-label">Actualizado</span><span class="tt-val">${fmtDate(fin)}</span></div>
    <div class="tt-row"><span class="tt-label">Días abierto</span><span class="tt-val">${t.dias}</span></div>
    <div class="tt-div"></div>
    <div class="tt-row"><span class="tt-label">Estado</span><span class="tt-val">${t.est}</span></div>`;
  tooltip.style.display='block';moveTip(ev);
}
function moveTip(ev){tooltip.style.left=Math.min(ev.clientX+14,window.innerWidth-290)+'px';tooltip.style.top=Math.min(ev.clientY-10,window.innerHeight-230)+'px';}
function hideTip(){tooltip.style.display='none';}
function render(){buildAxis();buildRows();}
document.querySelectorAll('.leg-marca').forEach(el=>{
  el.addEventListener('click',()=>{document.querySelectorAll('.leg-marca').forEach(x=>x.classList.remove('active'));el.classList.add('active');marcaFil=el.dataset.marca;render();});
});
document.getElementById('d-from').addEventListener('change',e=>{rangeStart=new Date(e.target.value);render();});
document.getElementById('d-to').addEventListener('change',e=>{rangeEnd=new Date(e.target.value);render();});
document.getElementById('search').addEventListener('input',e=>{searchTxt=e.target.value;render();});
document.getElementById('sort').addEventListener('change',e=>{sortMode=e.target.value;render();});
render();
</script>
